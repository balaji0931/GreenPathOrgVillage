<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background circle
            ctx.fillStyle = '#16a34a';
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, 2 * Math.PI);
            ctx.fill();

            // Leaf shape
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.95;
            
            const centerX = size / 2;
            const centerY = size / 2;
            const leafSize = size * 0.25;
            
            // Simple leaf shape
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, leafSize, leafSize * 1.5, 0, 0, 2 * Math.PI);
            ctx.fill();

            // Leaf stem
            ctx.strokeStyle = '#16a34a';
            ctx.globalAlpha = 0.8;
            ctx.lineWidth = size * 0.02;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - leafSize * 1.3);
            ctx.lineTo(centerX, centerY + leafSize * 1.3);
            ctx.stroke();

            return canvas.toDataURL('image/png');
        }

        // Generate all icon sizes
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        sizes.forEach(size => {
            const dataUrl = generateIcon(size);
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = dataUrl;
            document.body.appendChild(link);
            
            // Auto-download
            setTimeout(() => link.click(), 100 * sizes.indexOf(size));
        });
    </script>
</body>
</html>
