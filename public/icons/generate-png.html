<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <h1>Icon Generator</h1>
    <p>This will generate all required icon sizes from the 512x512 base icon.</p>
    <canvas id="canvas" style="display: none;"></canvas>
    <div id="status">Loading...</div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384];

        function generateIcons() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = function() {
                sizes.forEach(size => {
                    canvas.width = size;
                    canvas.height = size;
                    ctx.drawImage(img, 0, 0, size, size);

                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `icon-${size}x${size}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                    }, 'image/png');
                });

                document.getElementById('status').innerHTML = 'Icons generated! Check your downloads folder.';
            };

            img.src = 'icon-512x512.png';
        }

        generateIcons();
    </script>
</body>
</html>
