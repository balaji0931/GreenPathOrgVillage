<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background circle
            ctx.fillStyle = '#16a34a';
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, 2 * Math.PI);
            ctx.fill();

            // Leaf shape - more detailed and realistic
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.95;
            
            const centerX = size / 2;
            const centerY = size / 2;
            const leafWidth = size * 0.18;
            const leafHeight = size * 0.28;
            
            // More realistic leaf shape using curves
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - leafHeight);
            // Right side of leaf
            ctx.quadraticCurveTo(centerX + leafWidth * 0.8, centerY - leafHeight * 0.6, centerX + leafWidth, centerY);
            ctx.quadraticCurveTo(centerX + leafWidth * 0.7, centerY + leafHeight * 0.3, centerX + leafWidth * 0.3, centerY + leafHeight * 0.7);
            ctx.quadraticCurveTo(centerX + leafWidth * 0.1, centerY + leafHeight * 0.9, centerX, centerY + leafHeight);
            // Left side of leaf
            ctx.quadraticCurveTo(centerX - leafWidth * 0.1, centerY + leafHeight * 0.9, centerX - leafWidth * 0.3, centerY + leafHeight * 0.7);
            ctx.quadraticCurveTo(centerX - leafWidth * 0.7, centerY + leafHeight * 0.3, centerX - leafWidth, centerY);
            ctx.quadraticCurveTo(centerX - leafWidth * 0.8, centerY - leafHeight * 0.6, centerX, centerY - leafHeight);
            ctx.fill();

            // Leaf stem (main vein)
            ctx.strokeStyle = '#16a34a';
            ctx.globalAlpha = 0.7;
            ctx.lineWidth = size * 0.015;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - leafHeight * 0.9);
            ctx.lineTo(centerX, centerY + leafHeight * 0.9);
            ctx.stroke();
            
            // Side veins
            ctx.lineWidth = size * 0.008;
            ctx.globalAlpha = 0.5;
            
            // Left side veins
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - leafHeight * 0.4);
            ctx.quadraticCurveTo(centerX - leafWidth * 0.3, centerY - leafHeight * 0.2, centerX - leafWidth * 0.6, centerY + leafHeight * 0.1);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.quadraticCurveTo(centerX - leafWidth * 0.2, centerY + leafHeight * 0.1, centerX - leafWidth * 0.4, centerY + leafHeight * 0.4);
            ctx.stroke();
            
            // Right side veins
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - leafHeight * 0.4);
            ctx.quadraticCurveTo(centerX + leafWidth * 0.3, centerY - leafHeight * 0.2, centerX + leafWidth * 0.6, centerY + leafHeight * 0.1);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.quadraticCurveTo(centerX + leafWidth * 0.2, centerY + leafHeight * 0.1, centerX + leafWidth * 0.4, centerY + leafHeight * 0.4);
            ctx.stroke();

            return canvas.toDataURL('image/png');
        }

        // Generate all icon sizes
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        sizes.forEach(size => {
            const dataUrl = generateIcon(size);
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = dataUrl;
            document.body.appendChild(link);
            
            // Auto-download
            setTimeout(() => link.click(), 100 * sizes.indexOf(size));
        });
    </script>
</body>
</html>
