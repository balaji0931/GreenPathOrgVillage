<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="#16a34a"/>
  
  <!-- Leaf Icon -->
  <g transform="translate(256, 256)">
    <!-- Main Leaf Shape -->
    <path d="M-50 -80 Q0 -100 50 -80 Q80 -50 80 0 Q50 50 0 80 Q-50 50 -80 0 Q-80 -50 -50 -80 Z" 
          fill="#ffffff" opacity="0.95"/>
    
    <!-- Leaf Veins -->
    <path d="M-30 -40 Q0 -20 30 -40" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M-20 0 Q0 10 20 0" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M-30 40 Q0 20 30 40" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.7"/>
    
    <!-- Central Stem -->
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#16a34a" stroke-width="4" opacity="0.8"/>
  </g>
  
  <!-- Recycling Symbol (Small) -->
  <g transform="translate(360, 360) scale(0.8)">
    <path d="M-20 -10 L0 -20 L20 -10 L10 10 L-10 10 Z" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#16a34a"/>
  </g>
  
  <!-- Clean Lines/Paths -->
  <g transform="translate(150, 150)" opacity="0.6">
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    <circle cx="20" cy="20" r="3" fill="#ffffff"/>
    <circle cx="40" cy="10" r="2" fill="#ffffff"/>
  </g>
</svg>