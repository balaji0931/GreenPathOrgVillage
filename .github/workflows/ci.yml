name: CI — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      TEST_ADMIN_USER: ${{ secrets.TEST_ADMIN_USER }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      BCRYPT_ROUNDS: "1"
      IS_TEST_ENV: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for database readiness
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1
          echo "Waiting for Neon database to be ready..."
          for i in $(seq 1 10); do
            if pg_isready -h $(echo $DATABASE_URL | sed -n 's|.*@\([^:]*\):.*|\1|p') -p 5432 > /dev/null 2>&1; then
              echo "✅ Database is ready"
              break
            fi
            echo "⏳ Attempt $i/10 — waiting 5s..."
            sleep 5
          done

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
